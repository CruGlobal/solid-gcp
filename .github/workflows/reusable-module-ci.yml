name: Reusable Module CI

# TEMPORARY vendored copy of
# CruGlobal/cru-terraform-modules/.github/workflows/reusable-module-ci.yml
# @colocated-module-tooling, pending the devops discussion on whether tf
# modules may live in artifact repos like this one. If adopted:
# TODO: delete this file (+ .github/vendor/cru-terraform-modules/) and point
# terraform.yml back at the central reusable workflow; cru-terraform-modules
# also needs Settings -> Actions -> Access set to org-accessible (it's
# private, so cross-repo `uses:` and config checkouts fail today).
# Local changes vs upstream: cross-repo checkouts of shared config replaced
# with vendored copies under .github/vendor/cru-terraform-modules/.
#
# Reusable CI for Terraform modules that live outside cru-terraform-modules
# ("colocated modules"). Applies the same guardrails as this repo's own module
# checks: terraform fmt, terraform validate, tflint (with this repo's shared
# config), and terraform-docs. No cloud credentials are required (validate runs
# with -backend=false). See docs/colocated-modules.md for how to adopt it.

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory holding the module(s) to check (recursed into)."
        type: string
        required: false
        default: "terraform"
      terraform_version:
        description: "Terraform version (defaults to cru-terraform-modules' pinned version)."
        type: string
        required: false
        default: "1.14.4"

permissions:
  contents: read

# Shared config (.tflint.hcl, .pre-commit-config.yaml) is vendored under
# .github/vendor/cru-terraform-modules/ instead of checked out from the
# private cru-terraform-modules repo (upstream uses SHARED_CONFIG_REF).
env:
  SHARED_CONFIG_DIR: .github/vendor/cru-terraform-modules

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive

  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: terraform init & validate (each module directory)
        working-directory: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find . -type f -name '*.tf' -not -path '*/.terraform/*' -exec dirname {} \; | sort -u)
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No .tf files found under $(pwd)" >&2
            exit 1
          fi
          for dir in "${dirs[@]}"; do
            echo "::group::validate ${dir}"
            terraform -chdir="${dir}" init -backend=false -input=false
            terraform -chdir="${dir}" validate
            echo "::endgroup::"
          done

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v7

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.60.0

      - name: tflint
        working-directory: ${{ inputs.working_directory }}
        env:
          # tflint honors TFLINT_CONFIG_FILE globally, including in --recursive mode.
          TFLINT_CONFIG_FILE: ${{ github.workspace }}/${{ env.SHARED_CONFIG_DIR }}/.tflint.hcl
          # Authenticated plugin downloads avoid GitHub rate limits.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tflint --version
          tflint --init
          tflint --recursive

  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6

      - name: Install terraform-docs
        run: |
          set -euo pipefail
          version="0.21.0"
          curl -sSLo /tmp/terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/v${version}/terraform-docs-v${version}-linux-amd64.tar.gz"
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp terraform-docs
          sudo install -m 0755 /tmp/terraform-docs /usr/local/bin/terraform-docs
          terraform-docs --version

      - name: Install pre-commit
        run: pip install pre-commit==4.5.1

      # Run this repo's actual terraform_docs hook so output matches byte-for-byte.
      # The hook rewrites READMEs in place; --all-files + a nonzero exit means docs
      # are stale, so the job fails and the diff is shown.
      - name: Check terraform-docs output is up to date
        run: |
          set -euo pipefail
          pre-commit run terraform_docs \
            --all-files \
            --config ${{ env.SHARED_CONFIG_DIR }}/.pre-commit-config.yaml \
            --show-diff-on-failure \
            --color=always
