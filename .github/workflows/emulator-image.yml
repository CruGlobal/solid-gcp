name: Emulator image

# Smoke-tests the Firestore+Auth emulators image, then (on main) pushes it to
# GHCR. Multi-arch (arm64 for Apple-Silicon devs, amd64 for CI/servers). Tag
# tracks the pinned firebase-tools version grepped out of the Dockerfile ARG,
# plus :latest. PRs build + smoke-test only; nothing is published.

on:
  push:
    branches: [main]
    paths: [emulator-image/**]
  pull_request:
    paths: [emulator-image/**]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract FIREBASE_TOOLS_VERSION from Dockerfile
        id: version
        run: |
          version=$(sed -n 's/^ARG FIREBASE_TOOLS_VERSION=//p' emulator-image/Dockerfile)
          if [ -z "$version" ]; then
            echo "FIREBASE_TOOLS_VERSION ARG not found in Dockerfile" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Single-arch build loaded into the runner's docker for the smoke test.
      - uses: docker/build-push-action@v6
        with:
          context: emulator-image
          load: true
          tags: emulator-smoke

      - name: Smoke test (boot, curl both emulators, no runtime jar download)
        run: |
          docker run -d --name smoke -p 8080:8080 -p 9099:9099 emulator-smoke
          for i in $(seq 1 30); do
            curl -sf localhost:8080 >/dev/null && break
            sleep 1
          done
          echo "--- :8080 ---"; curl -s localhost:8080; echo
          echo "--- :9099 ---"; curl -s localhost:9099; echo
          echo "--- container logs ---"; docker logs smoke
          curl -sf localhost:8080 | grep -q Ok
          curl -sf localhost:9099 | grep -q authEmulator
          # The Firestore jar is baked in at build time; a runtime download
          # means the predownload regressed.
          ! docker logs smoke 2>&1 | grep -qi downloading
          docker rm -f smoke

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: github.event_name != 'pull_request'
        with:
          context: emulator-image
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/cruglobal/solid-gcp-firebase-emulators:${{ steps.version.outputs.version }}
            ghcr.io/cruglobal/solid-gcp-firebase-emulators:latest
