name: Terraform

on:
  pull_request:
    paths:
      - "terraform/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"

jobs:
  ci:
    # Colocated-module CI: shared fmt/validate/tflint from cru-terraform-modules.
    # TODO: move the @colocated-module-tooling ref to a release tag once that branch merges.
    uses: CruGlobal/cru-terraform-modules/.github/workflows/reusable-module-ci.yml@colocated-module-tooling
    with:
      working_directory: terraform
